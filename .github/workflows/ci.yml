name: CI — Krono

on:
  push:
    branches: [ develop, qa ]
  pull_request:
    branches: [ develop, main ]

jobs:
  # ─────────────────────────────────────
  # Lint y tests — Microservicio Core
  # ─────────────────────────────────────
  test-core:
    name: Test Core Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/core

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/core/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          PORT: 3001
          REDIS_URL: redis://localhost:6379
          POSTGRES_URL: postgresql://krono:krono@localhost:5432/krono_test
          API_KEY: test-api-key-ci
          JWT_SECRET: test-jwt-secret-ci

  # ─────────────────────────────────────
  # Lint y tests — Ghost-Messenger
  # ─────────────────────────────────────
