          NODE_ENV: test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-ci

  # ─────────────────────────────────────
  # Lint y tests — Flash-Fill
  # ─────────────────────────────────────
  test-flash-fill:
    name: Test Flash-Fill Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/flash-fill

    steps:
