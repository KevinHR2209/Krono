services:

  # ── Infraestructura ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: krono_postgres
    environment:
      POSTGRES_USER: krono_user
      POSTGRES_PASSWORD: krono_password
      POSTGRES_DB: krono_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U krono_user -d krono_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: krono_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: krono_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      flash-fill:
        condition: service_started

  # ── Microservicios ───────────────────────────────────────────
  core:
    build: ./services/core
    container_name: krono_core
    env_file:
      - ./services/core/.env
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://krono_user:krono_password@postgres:5432/krono_db
      REDIS_URL: redis://redis:6379
      API_KEY: super-secret-api-key
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/core/src:/app/src

  flash-fill:
    build: ./services/flash-fill
    container_name: krono_flash_fill
    env_file:
      - ./services/flash-fill/.env
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://krono_user:krono_password@postgres:5432/krono_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: krono_secret_token_key_2024
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/flash-fill/src:/app/src

  ghost-messenger:
    build: ./services/ghost-messenger
    container_name: krono_ghost_messenger
    env_file:
      - ./services/ghost-messenger/.env
    environment:
      PORT: 3002
      REDIS_URL: redis://redis:6379
      JWT_SECRET: krono_secret_token_key_2024
      FLASH_FILL_BASE_URL: http://localhost:5174/confirmar?token=
      WHATSAPP_MOCK: "true"
      WHATSAPP_API_URL: https://graph.facebook.com/v17.0/PHONE_ID/messages
      BULLMQ_QUEUE_NAME: ghost-messenger-notifications
    ports:
      - "3002:3002"
    depends_on:
      redis:
        condition: service_healthy
      frontend:
        condition: service_started
    volumes:
      - ./services/ghost-messenger/src:/app/src

volumes:
  postgres_data:
  redis_data: